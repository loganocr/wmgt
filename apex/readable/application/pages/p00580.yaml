regions: 
- # ====== Region: Player Moderation ===========================
  id: 106426503344160633
  identification: 
    name: Player Moderation
    type: Classic Report

  source: 
    location: Local Database
    type: SQL Query
    sql-query: |
      select m.id
           , m.player_id
           , nvl(p.player_name, m.player_id) player_name
           , m.banned_flag
           , case 
               when m.banned_flag = 'Y' then
                 'Banned'
               when m.timeout_flag = 'Y' then
                 case 
                 when m.timeout_tournament_id is not null then
                   'Timed out for Season ' || t.code
                 else
                   'Timed out until ' || to_char(m.timeout_end_date, 'DD-Mon-YYYY HH24:MI')
                 end
             else ''
             end as moderation_status
           , m.timeout_flag
           , decode(m.notes, null, '', 'Y') as notes_flag
           , m.notes
           , decode(m.player_message, null, '', 'Y') as player_message_flag
           , m.player_message
           , m.active_ind
           , m.created_by
           , m.created_on
           , m.updated_by
           , m.updated_on
        from wmg_player_moderation m
        left join wmg_players_v p on m.player_id = p.id
        left join wmg_tournaments t on m.timeout_tournament_id = t.id

  layout: 
    sequence: 10
    parent-region: No Parent
    slot: BODY
    start-new-layout: false
    start-new-row: true
    column: Automatic
    new-column: true
    column-span: Automatic

