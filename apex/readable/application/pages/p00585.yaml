- # ====== Process: Clear Opposite Values ======================
  id: 92658985056565732
  identification: 
    name: Clear Opposite Values
    type: Execute Code
    execution-chain: None

  source: 
    location: Local Database
    language: PL/SQL
    pl/sql-code: |
      if :P585_BANNED_FLAG = 'Y' then
        :P585_TIMEOUT_END_DATE := null;
