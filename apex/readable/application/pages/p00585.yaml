dynamic-actions: 
- # ====== Dynamic Action: Banned Option =======================
  id: 92658218019565725
  identification: 
    name: Banned Option

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Change
    selection-type: Item(s)
    item(s): 
    - P585_BANNED_FLAG

  client-side-condition: 
    type: Item = Value
    item: P585_BANNED_FLAG
    value: Y

  actions: 
  - # ====== Action: Hide ========================================
    id: 92658347163565726
    identification: 
      action: Hide

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P585_TIMEOUT_TOURNAMENT_ID
      - P585_TIMEOUT_END_DATE

    execution: 
      sequence: 10
      event: Banned Option # 92658218019565725
      fire-when-event-result-is: True
      fire-on-initialization: true

  - # ====== Action: Set Value ===================================
    id: 92658430436565727
    identification: 
      action: Set Value

    settings: 
      set-type: Static Assignment
      suppress-change-event: false

    affected-elements: 
      selection-type: Item(s)
      item(s): 
      - P585_TIMEOUT_FLAG

    execution: 
      sequence: 20
      event: Banned Option # 92658218019565725
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: Timeout Option ======================
  id: 92658604718565728
  identification: 
